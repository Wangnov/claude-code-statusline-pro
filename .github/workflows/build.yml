# npm publishing pipeline. Binaries are built by the cargo-dist generated
# release.yml on tag-push; this workflow fires after Release completes,
# downloads the platform archives from the GitHub Release, extracts the
# binaries into the npm platform packages, and publishes them via trusted
# publishing.
#
# Keeping this file's name (build.yml) and the job name (assemble-npm)
# unchanged preserves the existing npm trusted-publisher bindings for:
#   ccsp, claude-code-statusline-pro, @wangnov/ccsp-{linux,macos,windows}-{x64,arm64}
name: Build

# Codex review flagged two problems with the previous `on: release: published`
# trigger:
#   P1 - GitHub does not dispatch new workflow runs for events created by the
#        default GITHUB_TOKEN (anti-recursion). release.yml uses GITHUB_TOKEN
#        to publish the GitHub Release, so a `release: published` listener
#        here would never actually fire. `workflow_run` is exempt from that
#        restriction.
#   P2 - For workflow_dispatch re-runs we must check out the exact tag, not
#        the default branch, or the npm wrappers on main get bundled with
#        older binaries and republished under the old version.
on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v3.1.5) to rebuild npm packages for."
        required: true
        type: string

permissions:
  contents: read
  id-token: write # npm trusted publishing OIDC

jobs:
  assemble-npm:
    name: assemble npm package
    runs-on: ubuntu-latest
    # Fire on any version-tag Release completion, or on an explicit manual
    # dispatch. cargo-dist creates the GitHub Release in the `host` job before
    # later publish jobs such as Homebrew, so a downstream publish failure can
    # leave a valid GitHub Release behind while the overall workflow concludes
    # failure. We key npm publishing off release asset availability instead of
    # the final workflow conclusion.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' &&
       startsWith(github.event.workflow_run.head_branch, 'v'))
    environment:
      name: npm-release

    steps:
      - name: Determine release tag
        id: tag
        env:
          GH_EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ inputs.tag }}
          # On workflow_run from a tag push, head_branch is the tag name
          # (e.g. "v3.1.5"), not the source branch.
          WORKFLOW_RUN_BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          set -euo pipefail
          if [[ "$GH_EVENT_NAME" == "workflow_dispatch" ]]; then
            TAG="$INPUT_TAG"
          else
            TAG="$WORKFLOW_RUN_BRANCH"
          fi
          if [[ -z "$TAG" ]]; then
            echo "::error::could not determine release tag"
            exit 1
          fi
          VERSION="${TAG#v}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Using tag=${TAG}, version=${VERSION}"

      - name: Check GitHub Release availability
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -euo pipefail
          if gh release view "$TAG" --repo "${{ github.repository }}" > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "GitHub Release $TAG is available"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "GitHub Release $TAG is not available yet"
          fi

      - name: Fail manual rebuild when release is missing
        if: >-
          github.event_name == 'workflow_dispatch' &&
          steps.release.outputs.exists != 'true'
        run: |
          echo "::error::GitHub Release ${{ steps.tag.outputs.tag }} does not exist"
          exit 1

      # Check out the exact commit the tag points at so the npm wrappers
      # packaged here match the binaries in the GitHub Release (addresses
      # Codex P2 for workflow_dispatch reruns after main has advanced).
      - uses: actions/checkout@v6
        if: ${{ steps.release.outputs.exists == 'true' }}
        with:
          ref: ${{ steps.tag.outputs.tag }}

      - name: Download cargo-dist release assets
        if: ${{ steps.release.outputs.exists == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -euo pipefail
          mkdir -p dist/release
          gh release download "$TAG" \
            --repo "${{ github.repository }}" \
            --dir dist/release \
            --pattern 'claude-code-statusline-pro-*.tar.xz' \
            --pattern 'claude-code-statusline-pro-*.zip'
          ls -la dist/release

      - name: Extract platform binaries
        if: ${{ steps.release.outputs.exists == 'true' }}
        run: |
          set -euo pipefail
          mkdir -p dist/bin
          cd dist/release

          # Map npm platform label -> cargo-dist target triple
          declare -A TARGETS=(
            [linux-x64]=x86_64-unknown-linux-musl
            [linux-arm64]=aarch64-unknown-linux-musl
            [macos-x64]=x86_64-apple-darwin
            [macos-arm64]=aarch64-apple-darwin
            [windows-x64]=x86_64-pc-windows-msvc
            [windows-arm64]=aarch64-pc-windows-msvc
          )

          for platform in "${!TARGETS[@]}"; do
            target="${TARGETS[$platform]}"
            case "$platform" in
              windows-*)
                archive="claude-code-statusline-pro-${target}.zip"
                bin="claude-code-statusline-pro.exe"
                dest="../bin/${platform}.exe"
                ;;
              *)
                archive="claude-code-statusline-pro-${target}.tar.xz"
                bin="claude-code-statusline-pro"
                dest="../bin/${platform}"
                ;;
            esac

            if [[ ! -f "$archive" ]]; then
              echo "::error::missing archive for ${platform}: ${archive}"
              exit 1
            fi

            tmp="$(mktemp -d)"
            if [[ "$archive" == *.zip ]]; then
              unzip -q "$archive" -d "$tmp"
            else
              tar -xf "$archive" -C "$tmp"
            fi

            bin_path="${tmp}/claude-code-statusline-pro-${target}/${bin}"
            if [[ ! -f "$bin_path" ]]; then
              bin_path="$(find "$tmp" -maxdepth 2 -type f -name "$bin" | head -n 1)"
            fi
            if [[ -z "${bin_path:-}" || ! -f "$bin_path" ]]; then
              echo "::error::binary not found after extracting ${archive}"
              find "$tmp" -maxdepth 2 -mindepth 1 -print || true
              exit 1
            fi

            cp "$bin_path" "$dest"
            rm -rf "$tmp"
          done

          ls -la ../bin

      - name: Patch package.json versions to match release tag
        if: ${{ steps.release.outputs.exists == 'true' }}
        env:
          VERSION: ${{ steps.tag.outputs.version }}
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require('fs');
          const path = require('path');
          const version = process.env.VERSION;
          const files = [
            'npm/ccsp/package.json',
            'npm/claude-code-statusline-pro/package.json',
          ];
          const platformsDir = 'npm/platforms';
          for (const d of fs.readdirSync(platformsDir)) {
            const p = path.join(platformsDir, d, 'package.json');
            if (fs.existsSync(p)) files.push(p);
          }
          for (const f of files) {
            const pkg = JSON.parse(fs.readFileSync(f, 'utf8'));
            pkg.version = version;
            if (pkg.optionalDependencies) {
              for (const k of Object.keys(pkg.optionalDependencies)) {
                pkg.optionalDependencies[k] = version;
              }
            }
            fs.writeFileSync(f, JSON.stringify(pkg, null, 2) + '\n');
            console.log(`patched ${f} -> ${version}`);
          }
          NODE

      - name: Arrange binaries for npm packages
        if: ${{ steps.release.outputs.exists == 'true' }}
        run: |
          set -euo pipefail
          for platform in macos-arm64 macos-x64 linux-x64 linux-arm64; do
            pkg_dir="npm/platforms/ccsp-${platform}/bin"
            mkdir -p "$pkg_dir"
            cp "dist/bin/${platform}" "${pkg_dir}/ccsp"
            chmod +x "${pkg_dir}/ccsp"
            rm -f "${pkg_dir}/.gitkeep"
          done
          for platform in windows-x64 windows-arm64; do
            pkg_dir="npm/platforms/ccsp-${platform}/bin"
            mkdir -p "$pkg_dir"
            cp "dist/bin/${platform}.exe" "${pkg_dir}/ccsp.exe"
            rm -f "${pkg_dir}/.gitkeep"
          done

      - name: Setup Node
        if: ${{ steps.release.outputs.exists == 'true' }}
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Pack platform packages
        if: ${{ steps.release.outputs.exists == 'true' }}
        run: |
          set -euo pipefail
          packages=(
            ccsp-macos-arm64
            ccsp-macos-x64
            ccsp-linux-x64
            ccsp-linux-arm64
            ccsp-windows-x64
            ccsp-windows-arm64
          )
          for pkg in "${packages[@]}"; do
            pkg_dir="npm/platforms/${pkg}"
            rm -f "${pkg_dir}"/*.tgz
            (cd "${pkg_dir}" && npm pack)
          done

      - name: Pack main package (ccsp)
        if: ${{ steps.release.outputs.exists == 'true' }}
        run: |
          set -euo pipefail
          cp README.md npm/ccsp/
          rm -f npm/ccsp/*.tgz
          (cd npm/ccsp && npm pack)

      - name: Pack legacy package (claude-code-statusline-pro)
        if: ${{ steps.release.outputs.exists == 'true' }}
        run: |
          set -euo pipefail
          cp README.md npm/claude-code-statusline-pro/
          rm -f npm/claude-code-statusline-pro/*.tgz
          (cd npm/claude-code-statusline-pro && npm pack)

      - name: Smoke test assembled packages (linux-x64)
        if: ${{ steps.release.outputs.exists == 'true' }}
        run: |
          set -euo pipefail
          PLATFORM_TARBALL=$(ls npm/platforms/ccsp-linux-x64/*.tgz)
          MAIN_TARBALL=$(ls npm/ccsp/*.tgz)
          LEGACY_TARBALL=$(ls npm/claude-code-statusline-pro/*.tgz)

          TMP_DIR=$(mktemp -d)
          trap 'rm -rf "$TMP_DIR"' EXIT

          # Install all packages in one command to let npm handle dependencies correctly
          npm install --prefix "$TMP_DIR" --no-save "$PLATFORM_TARBALL" "$MAIN_TARBALL" "$LEGACY_TARBALL"

          NODE_PATH="$TMP_DIR/node_modules" node "$TMP_DIR/node_modules/ccsp/index.js" --version
          NODE_PATH="$TMP_DIR/node_modules" node "$TMP_DIR/node_modules/claude-code-statusline-pro/index.js" --help >/dev/null

      - name: Ensure npm versions are unpublished
        if: ${{ steps.release.outputs.exists == 'true' }}
        env:
          VERSION: ${{ steps.tag.outputs.version }}
        run: |
          set -euo pipefail
          packages=(
            ccsp
            claude-code-statusline-pro
            @wangnov/ccsp-linux-x64
            @wangnov/ccsp-linux-arm64
            @wangnov/ccsp-macos-x64
            @wangnov/ccsp-macos-arm64
            @wangnov/ccsp-windows-x64
            @wangnov/ccsp-windows-arm64
          )
          for pkg in "${packages[@]}"; do
            if npm view "${pkg}@${VERSION}" > /dev/null 2>&1; then
              echo "::error::${pkg}@${VERSION} already exists on npm"
              exit 1
            fi
          done

      - name: Publish npm packages
        if: ${{ steps.release.outputs.exists == 'true' }}
        run: |
          set -euo pipefail

          # npm Trusted Publishing 通过 GitHub OIDC 自动完成认证和 provenance
          for file in npm/platforms/*/*.tgz; do
            npm publish "$file" --access public
          done

          npm publish "$(ls npm/ccsp/*.tgz)" --access public
          npm publish "$(ls npm/claude-code-statusline-pro/*.tgz)" --access public

      - name: Upload npm tarballs
        if: ${{ steps.release.outputs.exists == 'true' }}
        uses: actions/upload-artifact@v7
        with:
          name: npm-packages
          path: |
            npm/platforms/*/*.tgz
            npm/ccsp/*.tgz
            npm/claude-code-statusline-pro/*.tgz
